<body class="bg-gray-50 text-gray-800 min-h-screen relative overflow-x-hidden">
    <!-- Dynamic background -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none opacity-50">
        <div class="absolute top-[10%] left-[10%] w-[40%] h-[40%] rounded-full bg-sky-200/40 blur-[100px]"></div>
        <div class="absolute bottom-[20%] right-[10%] w-[30%] h-[30%] rounded-full bg-indigo-200/40 blur-[100px]"></div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto max-w-7xl p-6 my-8 animate-[fadeIn_0.5s_ease-out]">
        <!-- Header mimicking prompt.html -->
        <div class="mb-6 flex flex-wrap gap-4 justify-between items-center bg-white/80 backdrop-blur-xl border border-white/50 rounded-2xl p-4 shadow-sm sticky top-4 z-50">
            <a href="index.html" class="inline-flex items-center text-gray-500 hover:text-sky-600 transition-colors font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Home
            </a>
            <div class="flex items-center gap-3 shrink-0">
                <h1 class="text-xl font-bold bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent hidden sm:block">
                    FreeForDev
                </h1>
            </div>
            <a href="https://github.com/ripienaar/free-for-dev" target="_blank"
                class="inline-flex items-center justify-end text-gray-400 hover:text-gray-600 transition-colors" title="View Source on GitHub">
                <i class="fa-brands fa-github text-xl"></i>
            </a>
        </div>

        <!-- Stats / Intro -->
        <div class="mb-8 text-center max-w-3xl mx-auto mt-12 block">
            <h2 class="font-heading text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">
                Unlock the Best Free Tier Services
            </h2>
            <p class="text-gray-500 text-lg">
                Curated list of software (SaaS, PaaS, IaaS) with free tiers for developers.
                <br />
                <span class="text-sm mt-3 inline-block px-4 py-1.5 rounded-full bg-white border border-gray-200 text-gray-500 shadow-sm">
                    <span id="totalResources" class="font-bold text-sky-600">0</span> resources across
                    <span id="totalCategories" class="font-bold text-indigo-600">0</span> categories
                </span>
            </p>
        </div>

        <!-- Search and Filter Section -->
        <section class="mb-8 bg-white/80 backdrop-blur-xl border border-white/50 rounded-2xl p-6 shadow-sm">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow relative">
                    <input type="text" id="searchInput" placeholder="Search for tools, categories, or keywords... (e.g. 'AWS', 'Hosting')"
                        class="w-full pl-10 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500/20 transition-all font-sans" />
                    <svg class="absolute left-3 top-3.5 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <kbd
                            class="hidden sm:inline-flex items-center gap-1 px-2 py-0.5 rounded border border-gray-200 bg-white text-xs text-gray-400 font-mono shadow-sm">
                            <span class="text-xs">/</span>
                        </kbd>
                    </div>
                </div>
            </div>
        </section>

        <!-- No Results -->
        <div id="noResults" class="hidden text-center py-20">
            <div class="w-16 h-16 mx-auto bg-white border border-gray-200 rounded-full flex items-center justify-center mb-4 shadow-sm">
                <i class="fa-solid fa-ghost text-2xl text-gray-400"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">No results found</h3>
            <p class="text-gray-500">Try adjusting your search terms.</p>
        </div>

        <!-- Categories Container -->
        <div id="contentContainer" class="space-y-12">
            <!-- Dynamic Content -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-8 text-gray-500 text-sm relative z-10">

        <div class="mt-2">
            Contact: <a href="mailto:bangndd@gmail.com" class="hover:text-gray-900 transition-colors font-medium">bangndd@gmail.com</a>
        </div>
    </footer>

    <!-- Back to Top -->
    <button id="backToTop"
        class="fixed bottom-8 right-8 z-50 p-3 bg-sky-600 text-white rounded-full shadow-lg shadow-sky-600/30 translate-y-20 opacity-0 transition-all hover:bg-sky-500 hover:-translate-y-1 focus:outline-none">
