<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer & Editor - Free Developer Tools</title>
    <meta name="description" content="Free online Markdown viewer and editor. Render Markdown with Mermaid diagrams support and export to PNG image. Privacy-friendly, client-side processing." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script src="https://unpkg.com/@zumer/snapdom@latest/dist/snapdom.js"></script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Markdown generated content styles */
        .prose pre {
            background-color: #f3f4f6;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }
        .prose code {
            color: #ef4444;
            background-color: #f3f4f6;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        .prose pre code {
            color: inherit;
            background-color: transparent;
            padding: 0;
        }
        .prose blockquote {
            border-left-width: 4px;
            border-color: #e5e7eb;
            padding-left: 1rem;
            font-style: italic;
        }
        .prose table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.25em;
            margin-bottom: 1.25em;
        }
        .prose th, .prose td {
            border: 1px solid #e5e7eb;
            padding: 0.5rem;
        }
        .prose th {
            background-color: #f9fafb;
            font-weight: 600;
        }
        /* Header styling */
        .prose h1 {
            font-size: 2.25em;
            margin-top: 0;
            margin-bottom: 0.8em;
            font-weight: 800;
            line-height: 1.1111111;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #e5e7eb;
            color: #1e293b;
        }
        .prose h2 {
            font-size: 1.5em;
            margin-top: 2em;
            margin-bottom: 1em;
            font-weight: 700;
            line-height: 1.3333333;
            padding-bottom: 0.3em;
            border-bottom: 1px solid #e5e7eb;
            color: #334155;
        }
        .prose h3 {
            font-size: 1.25em;
            margin-top: 1.6em;
            margin-bottom: 0.6em;
            font-weight: 600;
            line-height: 1.6;
            color: #334155;
        }
        .prose h4 {
            font-size: 1em; /* base size but bold */
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.5;
            color: #334155;
        }
        .prose h5 {
            font-size: 0.875em;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            color: #334155;
        }
        .prose h6 {
            font-size: 0.85em; /* slightly smaller or same as p but bold */
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
        }
        .prose p {
            margin-top: 1.25em;
            margin-bottom: 1.25em;
            line-height: 1.75;
        }
        .mermaid {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center text-slate-600 hover:text-indigo-600 transition-colors">
                        <i class="fa-solid fa-arrow-left mr-2"></i>
                        <span class="font-medium">Home</span>
                    </a>
                    <div class="h-6 w-px bg-slate-300 mx-4"></div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">
                        <i class="fa-brands fa-markdown mr-2"></i>Markdown Viewer
                    </h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="exportBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm flex items-center">
                        <i class="fa-solid fa-download mr-2"></i>
                        Export PNG
                    </button>
                    <a href="https://github.com/nbang/nbang.github.io" target="_blank" class="text-slate-400 hover:text-slate-800 transition-colors">
                        <i class="fa-brands fa-github text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 h-[calc(100vh-4rem)]">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full">
            
            <!-- Editor Column -->
            <div class="flex flex-col h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100 bg-slate-50">
                    <h2 class="font-semibold text-slate-700 flex items-center">
                        <i class="fa-solid fa-code mr-2 text-indigo-500"></i> Editor
                    </h2>
                    <div class="flex space-x-2">
                        <label for="fileInput" class="cursor-pointer text-xs bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-md transition-colors flex items-center shadow-sm">
                            <i class="fa-solid fa-folder-open mr-1.5"></i> Open File
                            <input type="file" id="fileInput" class="hidden" accept=".md,.txt,.markdown" />
                        </label>
                        <div class="relative flex items-center">
                            <input type="text" id="urlInput" placeholder="https://..." class="pl-2 pr-8 py-1.5 text-xs text-slate-700 bg-white border border-slate-300 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500 w-32 focus:w-64 transition-all" />
                            <button id="loadUrlBtn" class="absolute right-1 text-slate-400 hover:text-indigo-600 p-0.5">
                                <i class="fa-solid fa-cloud-arrow-down"></i>
                            </button>
                        </div>
                        <button id="clearBtn" class="text-xs bg-white border border-slate-300 hover:text-red-600 hover:border-red-200 hover:bg-red-50 text-slate-700 px-3 py-1.5 rounded-md transition-colors shadow-sm">
                            Clear
                        </button>
                    </div>
                </div>
                <div class="flex-1 w-full relative">
                    <textarea id="markdownInput" class="w-full h-full p-4 resize-none focus:outline-none focus:ring-0 font-mono text-sm leading-relaxed text-slate-800 bg-white" placeholder="# Type or paste Markdown here...
\nTry Mermaid diagrams:
```mermaid
graph TD;
    A-->B;
    A-->C;
    B-->D;
    C-->D;
```"></textarea>
                </div>
            </div>

            <!-- Preview Column -->
            <div class="flex flex-col h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100 bg-slate-50">
                    <h2 class="font-semibold text-slate-700 flex items-center">
                        <i class="fa-solid fa-eye mr-2 text-purple-500"></i> Preview
                    </h2>
                    <span class="text-xs text-slate-500 bg-slate-200 px-2 py-1 rounded">Live Preview</span>
                </div>
                <!-- Wrapper for capture to include background -->
                <div id="previewContainer" class="flex-1 overflow-y-auto bg-white relative">
                    <div id="previewContent" class="prose prose-slate max-w-none p-8"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="md_viewer.js"></script>
</body>
</html>
